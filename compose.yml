services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: osk
      POSTGRES_PASSWORD: osk
      POSTGRES_DB: osk
    volumes:
      - osk-postgres:/var/lib/postgresql/data
    ports:
      - "${OSK_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osk"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - osk-ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || true"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  osk-postgres:
  osk-ollama:
