name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format Check
        run: ruff format --check .

      - name: Run scaffold doctor
        run: |
          python -m osk doctor --json > doctor.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("doctor.json").read_text())
          if not payload["scaffold"]["ready"]:
              raise SystemExit("Scaffold doctor reported missing required repo paths.")
          print("Scaffold doctor passed.")
          if not payload["install"]["ready"]:
              print("Install assets are missing on the CI runner; continuing.")
          PY

      - name: Run tests
        run: pytest
