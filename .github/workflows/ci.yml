name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format Check
        run: ruff format --check .

      - name: Run scaffold doctor
        run: |
          python -m osk doctor --json > doctor.json || true
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("doctor.json").read_text())
          if not payload["scaffold"]["ready"]:
              raise SystemExit("Scaffold doctor reported missing required repo paths.")
          print("Scaffold doctor passed.")
          if not payload["install"]["ready"]:
              print("Install assets are missing on the CI runner; continuing.")
          PY

      - name: Run tests
        run: pytest

      - name: Build package
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install build
          python -m build
